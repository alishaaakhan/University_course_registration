{% extends "base.html" %}
{% block title %}{{ 'Edit' if course else 'Add' }} Course{% endblock %}
{% block crumb %}Course Management{% endblock %}

{% block content %}
<h1 class="page-title mb-4">{{ 'Edit Course' if course else 'Add New Course' }}</h1>

<div class="card app-card" style="max-width: 680px;">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Course ID</label>
                    <input type="text" name="course_id" class="form-control" required
                           {{ 'readonly' if course }}
                           value="{{ course.course_id if course else '' }}"
                           placeholder="e.g. CS301">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Credits</label>
                    <input type="number" name="credits" min="1" max="6" class="form-control" required
                           value="{{ course.credits if course else 4 }}">
                </div>
                <div class="col-md-12">
                    <label class="form-label">Course Name</label>
                    <input type="text" name="course_name" class="form-control" required
                           value="{{ course.course_name if course else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Department</label>
                    <select name="dept_id" class="form-select" required>
                        <option value="" disabled {{ '' if course else 'selected' }}>Select department</option>
                        {% for d in departments %}
                            <option value="{{ d.dept_id }}"
                                {{ 'selected' if course and course.dept_id == d.dept_id }}>
                                {{ d.dept_name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Primary Faculty</label>
                    <select name="faculty_id" class="form-select">
                        <option value="">Unassigned</option>
                        {% for f in faculty_members %}
                            <option value="{{ f.faculty_id }}"
                                {{ 'selected' if course and course.faculty_id == f.faculty_id }}>
                                {{ f.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Seat Capacity</label>
                    <input type="number" name="seat_capacity" min="1" class="form-control" required
                           value="{{ course.seat_capacity if course else 60 }}">
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-gold">Save Course</button>
                <a href="{{ url_for('courses.list_courses') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
